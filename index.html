<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flappy Math - SansiAsaf</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }

        #gameCanvas {
            width: 100%;
            height: 100%;
            object-fit: fill; /* Taşsın, uzasın, esnesin! */
            image-rendering: crisp-edges;
            image-rendering: pixelated;
            touch-action: none;
            background: #000;
        }

        #infoBtn {
            position: absolute;
            top: 15px;
            left: 15px;
            width: 44px;
            height: 44px;
            background: rgba(255,255,255,0.95);
            border: 3px solid #333;
            border-radius: 50%;
            font-size: 24px;
            font-weight: bold;
            color: #333;
            cursor: pointer;
            z-index: 30;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        #infoBtn:active {
            transform: scale(0.9);
            background: #ffd700;
        }

        #infoMessage {
            position: absolute;
            top: 70px;
            left: 15px;
            background: rgba(0,0,0,0.85);
            color: #ffd700;
            padding: 12px 20px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            z-index: 25;
            display: none;
            border-left: 4px solid #ffd700;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            animation: slideIn 0.3s;
        }

        @keyframes slideIn {
            from { transform: translateX(-20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        #score {
            position: absolute;
            top: 15px;
            right: 20px;
            color: white;
            font-size: 48px;
            font-weight: bold;
            text-shadow: 3px 3px 0 #000, 5px 5px 0 rgba(0,0,0,0.5);
            z-index: 5;
            font-family: 'Arial Black', sans-serif;
        }

        #questionPanel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: min(90%, 500px);
            max-height: 90vh;
            background: linear-gradient(145deg, #1a2f3f, #0f1a24);
            z-index: 100;
            display: none;
            flex-direction: column;
            padding: 30px 25px;
            color: white;
            overflow-y: auto;
            animation: fadeIn 0.3s;
            border-radius: 30px;
            border: 4px solid #ffd700;
            box-shadow: 0 20px 40px rgba(0,0,0,0.9), 0 0 40px #ffd70066;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translate(-50%, -40%); }
            to { opacity: 1; transform: translate(-50%, -50%); }
        }

        #questionHeader {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        #questionType {
            background: #ffd700;
            color: #1a2f3f;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #questionCount {
            background: rgba(255,255,255,0.15);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 14px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        #questionText {
            font-size: 20px;
            line-height: 1.5;
            margin-bottom: 25px;
            padding: 20px;
            background: rgba(255,255,255,0.08);
            border-radius: 15px;
            border-left: 5px solid #ffd700;
            font-weight: 500;
            word-wrap: break-word;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin: 15px 0 25px;
        }

        .option-btn {
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.15);
            color: white;
            padding: 18px 20px;
            border-radius: 50px;
            font-size: 20px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            letter-spacing: 0.5px;
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .option-btn:active {
            transform: scale(0.98);
        }

        .option-btn.correct-highlight {
            background: rgba(46, 204, 113, 0.3);
            border-color: #2ecc71;
            box-shadow: 0 0 15px rgba(46, 204, 113, 0.5);
        }

        .option-btn.selected-correct {
            background: linear-gradient(145deg, #27ae60, #2ecc71);
            border-color: #fff;
            transform: scale(1.02);
            box-shadow: 0 0 20px #2ecc71;
        }

        .option-btn.selected-wrong {
            background: linear-gradient(145deg, #c0392b, #e74c3c);
            border-color: #fff;
        }

        #solutionText {
            margin: 15px 0;
            padding: 20px;
            background: rgba(52, 152, 219, 0.2);
            border-left: 5px solid #3498db;
            border-radius: 10px;
            font-size: 16px;
            line-height: 1.6;
            display: none;
            backdrop-filter: blur(5px);
            animation: slideUp 0.3s;
            word-wrap: break-word;
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        #nextQuestionBtn, #continueBtn, #startGameBtn {
            margin-top: 12px;
            padding: 18px;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            display: none;
            box-shadow: 0 8px 15px rgba(0,0,0,0.3);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #nextQuestionBtn {
            background: linear-gradient(145deg, #f39c12, #ffd700);
            color: #1a2f3f;
        }

        #continueBtn {
            background: linear-gradient(145deg, #27ae60, #2ecc71);
            color: white;
        }

        #startGameBtn {
            background: linear-gradient(145deg, #3498db, #2980b9);
            color: white;
            font-size: 20px;
            border: 3px solid #ffd700;
            opacity: 0.5;
            cursor: not-allowed;
        }

        #startGameBtn.active {
            opacity: 1;
            cursor: pointer;
            background: linear-gradient(145deg, #2ecc71, #27ae60);
            border-color: #fff;
            box-shadow: 0 0 20px #2ecc71;
        }

        #nextQuestionBtn:active, #continueBtn:active, #startGameBtn.active:active {
            transform: scale(0.95);
        }

        #gameoverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 50;
            display: none;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        #gameoverImage {
            width: min(80%, 400px);
            image-rendering: pixelated;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="288" height="512"></canvas>
        <div id="infoBtn" onclick="showInfo()">İ</div>
        <div id="infoMessage">OmerAsaf tarafından geliştirildi</div>
        <div id="score">0</div>
        
        <div id="gameoverScreen">
            <img id="gameoverImage" src="sprites/gameover.png" alt="Game Over">
        </div>
        
        <div id="questionPanel">
            <div id="questionHeader">
                <span id="questionType"></span>
                <span id="questionCount"></span>
            </div>
            <div id="questionText"></div>
            <div class="options-container" id="optionsContainer"></div>
            <div id="solutionText"></div>
            <button id="nextQuestionBtn" onclick="loadNewQuestion()">Başka Soruya Geç →</button>
            <button id="continueBtn" onclick="continueGame()">Oyuna Dön →</button>
            <button id="startGameBtn" onclick="startGameFromQuestion()">Oyuna Başla!</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Oyun değişkenleri
        let gameActive = false;
        let questionMode = true;
        let score = 0;
        let correctAnswered = false;
        let waitingForStart = true;
        let gameoverVisible = false;
        
        // Oyun alanı her zaman tam ekran uzasın diye sabit değerler
        const GAME_WIDTH = 288;
        const GAME_HEIGHT = 512;
        
        // Ölçek faktörleri
        let scaleX = 1;
        let scaleY = 1;
        
        let bird = {
            x: 60,
            y: 250,
            width: 34,
            height: 24,
            velocity: 0,
            gravity: 0.2,
            jump: -4.8,
            frame: 0
        };
        
        let pipes = [];
        const PIPE_WIDTH = 52;
        const PIPE_GAP = 130;
        let frameCount = 0;
        let nightMode = false;
        let baseX = 0;
        
        // Soru havuzu (100 soru)
        const questions = [];
        for (let i = 1; i <= 100; i++) {
            if (i % 3 === 0) {
                const a = Math.floor(Math.random() * 5) + 2;
                const b = Math.floor(Math.random() * 5) + 3;
                const correct = ((b * 10) / a).toFixed(1);
                questions.push({
                    id: i,
                    text: `${a} metre kumaş ${b * 10} TL ise, 1 metre kumaş kaç TL'dir? (Doğru Orantı)`,
                    type: 'doğru orantı',
                    correct: correct,
                    solution: `${a} metre → ${b * 10} TL ise, 1 metre → ${b * 10} ÷ ${a} = ${correct} TL`
                });
            } else if (i % 3 === 1) {
                const a = Math.floor(Math.random() * 4) + 3;
                const b = Math.floor(Math.random() * 4) + 4;
                const day = Math.floor(Math.random() * 6) + 6;
                const correct = ((a * day) / b).toFixed(1);
                questions.push({
                    id: i,
                    text: `${a} usta bir duvarı ${day} günde örüyor. Aynı duvarı ${b} usta kaç günde örer? (Ters Orantı)`,
                    type: 'ters orantı',
                    correct: correct,
                    solution: `${a} usta × ${day} gün = ${a * day} iş. ${b} usta → ${a * day} ÷ ${b} = ${correct} gün`
                });
            } else {
                const a = Math.floor(Math.random() * 4) + 3;
                const b = Math.floor(Math.random() * 3) + 4;
                const gun1 = 12;
                const c = Math.floor(Math.random() * 3) + 4;
                const saat2 = 8;
                const sabit = a * b * gun1;
                const correct = (sabit / (c * saat2)).toFixed(1);
                questions.push({
                    id: i,
                    text: `${a} işçi günde ${b} saat çalışarak bir işi ${gun1} günde bitiriyor. Aynı işi ${c} işçi günde ${saat2} saat çalışarak kaç günde bitirir? (Ters Orantı)`,
                    type: 'ters orantı',
                    correct: correct,
                    solution: `${a}×${b}×${gun1} = ${sabit} (toplam iş). ${c}×${saat2}×x = ${sabit} → x = ${correct}`
                });
            }
        }
        
        // Sorulara rastgele şıklar ekle
        questions.forEach(q => {
            const correct = parseFloat(q.correct);
            const wrong1 = (correct + (Math.random() * 2 + 0.5)).toFixed(1);
            const wrong2 = (correct - (Math.random() * 1.5 + 0.2)).toFixed(1);
            const wrong3 = (correct + (Math.random() * 3 + 1)).toFixed(1);
            
            let options = [correct.toString(), wrong1, wrong2, wrong3];
            options = options.sort(() => Math.random() - 0.5);
            q.options = options;
        });
        
        // Soru takibi
        let askedQuestions = new Set();
        let currentQuestion = null;
        let selectedOption = null;
        let showSolution = false;
        
        // Sesler
        const sounds = {
            die: new Audio(),
            hit: new Audio(),
            point: new Audio(),
            wing: new Audio()
        };
        
        function loadSounds() {
            try {
                sounds.die.src = 'audio/die.ogg';
                sounds.hit.src = 'audio/hit.ogg';
                sounds.point.src = 'audio/point.ogg';
                sounds.wing.src = 'audio/wing.ogg';
                
                Object.values(sounds).forEach(sound => {
                    sound.load();
                    sound.volume = 0.5;
                });
            } catch(e) {
                console.warn('Sesler yüklenemedi:', e);
            }
        }
        loadSounds();
        
        // Asset'ler
        const assets = {
            backgroundDay: new Image(),
            backgroundNight: new Image(),
            base: new Image(),
            birdDown: new Image(),
            birdMid: new Image(),
            birdUp: new Image(),
            pipeGreen: new Image(),
            pipeRed: new Image(),
            message: new Image(),
            gameover: new Image()
        };
        
        assets.backgroundDay.src = 'sprites/background-day.png';
        assets.backgroundNight.src = 'sprites/background-night.png';
        assets.base.src = 'sprites/base.png';
        assets.birdDown.src = 'sprites/bluebird-downflap.png';
        assets.birdMid.src = 'sprites/bluebird-midflap.png';
        assets.birdUp.src = 'sprites/bluebird-upflap.png';
        assets.pipeGreen.src = 'sprites/pipe-green.png';
        assets.pipeRed.src = 'sprites/pipe-red.png';
        assets.message.src = 'sprites/message.png';
        assets.gameover.src = 'sprites/gameover.png';
        
        assets.gameover.onload = () => {
            document.getElementById('gameoverImage').src = assets.gameover.src;
        };
        
        function showInfo() {
            const msg = document.getElementById('infoMessage');
            msg.style.display = 'block';
            setTimeout(() => {
                msg.style.display = 'none';
            }, 2000);
        }
        
        function loadNewQuestion() {
            const available = questions.filter(q => !askedQuestions.has(q.id));
            
            if (available.length === 0) {
                askedQuestions.clear();
                currentQuestion = questions[Math.floor(Math.random() * questions.length)];
            } else {
                currentQuestion = available[Math.floor(Math.random() * available.length)];
            }
            
            askedQuestions.add(currentQuestion.id);
            
            document.getElementById('questionType').textContent = `📐 ${currentQuestion.type.toUpperCase()}`;
            document.getElementById('questionCount').textContent = `📊 ${askedQuestions.size}/100`;
            document.getElementById('questionText').textContent = currentQuestion.text;
            
            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';
            
            currentQuestion.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = `${String.fromCharCode(65 + index)}) ${opt}`;
                btn.onclick = () => selectOption(index, opt);
                optionsContainer.appendChild(btn);
            });
            
            document.getElementById('solutionText').style.display = 'none';
            document.getElementById('nextQuestionBtn').style.display = 'none';
            document.getElementById('continueBtn').style.display = 'none';
            
            // Start butonunu güncelle
            const startBtn = document.getElementById('startGameBtn');
            startBtn.style.display = 'block';
            startBtn.classList.remove('active');
            startBtn.textContent = 'Oyuna Başla! (Önce soruyu doğru cevapla)';
            
            selectedOption = null;
            showSolution = false;
            
            document.getElementById('questionPanel').style.display = 'flex';
            questionMode = true;
            gameActive = false;
            gameoverVisible = false;
            document.getElementById('gameoverScreen').style.display = 'none';
        }
        
        function selectOption(index, value) {
            if (showSolution) return;
            
            selectedOption = index;
            const isCorrect = (parseFloat(value) === parseFloat(currentQuestion.correct));
            
            const optionBtns = document.querySelectorAll('.option-btn');
            
            optionBtns.forEach((btn, i) => {
                btn.classList.remove('selected-correct', 'selected-wrong', 'correct-highlight');
                
                if (parseFloat(currentQuestion.options[i]) === parseFloat(currentQuestion.correct)) {
                    btn.classList.add('correct-highlight');
                }
                
                if (i === index) {
                    if (isCorrect) {
                        btn.classList.add('selected-correct');
                    } else {
                        btn.classList.add('selected-wrong');
                    }
                }
            });
            
            showSolution = true;
            const solutionDiv = document.getElementById('solutionText');
            solutionDiv.innerHTML = `📝 ${currentQuestion.solution}`;
            solutionDiv.style.display = 'block';
            
            const startBtn = document.getElementById('startGameBtn');
            
            if (isCorrect) {
                correctAnswered = true;
                
                // Start butonunu aktif et
                startBtn.classList.add('active');
                startBtn.textContent = '🚀 Oyuna Başla!';
                
                try { sounds.point.play(); } catch(e) {}
            } else {
                correctAnswered = false;
                document.getElementById('nextQuestionBtn').style.display = 'block';
                document.getElementById('continueBtn').style.display = 'none';
                
                // Start butonunu pasif yap
                startBtn.classList.remove('active');
                startBtn.textContent = 'Oyuna Başla! (Önce soruyu doğru cevapla)';
                
                try { sounds.hit.play(); } catch(e) {}
            }
        }
        
        function continueGame() {
            document.getElementById('questionPanel').style.display = 'none';
            questionMode = false;
            gameActive = true;
            waitingForStart = false;
        }
        
        function startGameFromQuestion() {
            // Sadece doğru cevaplanmışsa başlasın
            if (correctAnswered) {
                document.getElementById('questionPanel').style.display = 'none';
                questionMode = false;
                gameActive = true;
                waitingForStart = false;
                
                // Oyunu sıfırla
                reset();
            }
        }
        
        function reset() {
            bird.y = 250;
            bird.velocity = 0;
            pipes = [];
            score = 0;
            frameCount = 0;
            nightMode = false;
            baseX = 0;
            correctAnswered = false;
            document.getElementById('score').textContent = '0';
        }
        
        function gameOver() {
            gameActive = false;
            correctAnswered = false;
            waitingForStart = true;
            
            try { sounds.die.play(); } catch(e) {}
            
            gameoverVisible = true;
            document.getElementById('gameoverScreen').style.display = 'flex';
            
            setTimeout(() => {
                if (gameoverVisible) {
                    document.getElementById('gameoverScreen').style.display = 'none';
                    loadNewQuestion();
                }
            }, 2000);
        }
        
        function update() {
            if (!gameActive || questionMode) return;
            
            // Kuş fiziği (orijinal koordinatlarda)
            bird.velocity += bird.gravity;
            bird.y += bird.velocity;
            
            // Kuş animasyonu
            bird.frame = (bird.frame + 1) % 30;
            
            // Boru oluşturma
            frameCount++;
            if (frameCount % 100 === 0) {
                const pipeY = Math.random() * -180;
                pipes.push({
                    x: GAME_WIDTH,
                    y: pipeY,
                    passed: false
                });
            }
            
            // Boruları hareket ettir
            for (let i = pipes.length - 1; i >= 0; i--) {
                pipes[i].x -= 2.5;
                
                if (!pipes[i].passed && pipes[i].x + PIPE_WIDTH < bird.x) {
                    pipes[i].passed = true;
                    score++;
                    document.getElementById('score').textContent = score;
                    
                    try { sounds.point.play(); } catch(e) {}
                    
                    if (score % 5 === 0) {
                        nightMode = !nightMode;
                    }
                }
                
                if (pipes[i].x + PIPE_WIDTH < 0) {
                    pipes.splice(i, 1);
                }
            }
            
            baseX = (baseX - 2) % 336;
            
            // Çarpışma (orijinal koordinatlarda)
            if (bird.y + bird.height >= GAME_HEIGHT - 112 || bird.y <= 0) {
                gameOver();
                return;
            }
            
            for (let pipe of pipes) {
                // Üst boru
                if (bird.x < pipe.x + PIPE_WIDTH &&
                    bird.x + bird.width > pipe.x &&
                    bird.y < pipe.y + 320 &&
                    bird.y + bird.height > pipe.y) {
                    gameOver();
                    return;
                }
                
                // Alt boru
                if (bird.x < pipe.x + PIPE_WIDTH &&
                    bird.x + bird.width > pipe.x &&
                    bird.y < pipe.y + 320 + PIPE_GAP + 320 &&
                    bird.y + bird.height > pipe.y + 320 + PIPE_GAP) {
                    gameOver();
                    return;
                }
            }
        }
        
        function draw() {
            ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
            
            // Arkaplan (orijinal boyutta çiz, canvas zaten esneyecek)
            ctx.drawImage(nightMode ? assets.backgroundNight : assets.backgroundDay, 0, 0, GAME_WIDTH, GAME_HEIGHT);
            
            // Borular
            for (let pipe of pipes) {
                const pipeImg = nightMode ? assets.pipeRed : assets.pipeGreen;
                
                // Üst boru (ters)
                ctx.save();
                ctx.translate(pipe.x + PIPE_WIDTH/2, pipe.y + 160);
                ctx.scale(1, -1);
                ctx.drawImage(pipeImg, -PIPE_WIDTH/2, -160, PIPE_WIDTH, 320);
                ctx.restore();
                
                // Alt boru
                ctx.drawImage(pipeImg, pipe.x, pipe.y + 320 + PIPE_GAP, PIPE_WIDTH, 320);
            }
            
            // Base
            ctx.drawImage(assets.base, baseX, GAME_HEIGHT - 112, 336, 112);
            ctx.drawImage(assets.base, baseX + 336, GAME_HEIGHT - 112, 336, 112);
            
            // Kuş
            let birdImage;
            if (bird.frame < 10) birdImage = assets.birdDown;
            else if (bird.frame < 20) birdImage = assets.birdMid;
            else birdImage = assets.birdUp;
            
            ctx.save();
            ctx.translate(bird.x + bird.width/2, bird.y + bird.height/2);
            ctx.rotate(Math.min(Math.max(bird.velocity * 0.03, -0.4), 0.4));
            ctx.drawImage(birdImage, -bird.width/2, -bird.height/2, bird.width, bird.height);
            ctx.restore();
            
            // Bekleme mesajı
            if (!gameActive && !questionMode && !gameoverVisible && waitingForStart) {
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
                ctx.fillStyle = '#ffd700';
                ctx.font = 'bold 20px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('SORU ÇÖZMEDEN', GAME_WIDTH/2, 200);
                ctx.fillText('OYUN BAŞLAMAZ!', GAME_WIDTH/2, 240);
                ctx.font = '16px Arial';
                ctx.fillStyle = 'white';
                ctx.fillText('Ekrana tıkla ve soruyu çöz', GAME_WIDTH/2, 300);
            }
        }
        
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        // Tıklama olayları
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = GAME_WIDTH / rect.width;
            const scaleY = GAME_HEIGHT / rect.height;
            const x = (e.clientX - rect.left) * scaleX;
            const y = (e.clientY - rect.top) * scaleY;
            
            if (x < 50 && y < 50) {
                showInfo();
                return;
            }
            
            if (gameActive && !questionMode) {
                bird.velocity = bird.jump;
                try { sounds.wing.play(); } catch(e) {}
            } else if (!gameActive && !questionMode && waitingForStart) {
                // Beklerken tıklayınca soru panelini aç
                loadNewQuestion();
            }
        });
        
        // Touch event
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const scaleX = GAME_WIDTH / rect.width;
            const scaleY = GAME_HEIGHT / rect.height;
            const x = (touch.clientX - rect.left) * scaleX;
            const y = (touch.clientY - rect.top) * scaleY;
            
            if (x < 50 && y < 50) {
                showInfo();
                return;
            }
            
            if (gameActive && !questionMode) {
                bird.velocity = bird.jump;
                try { sounds.wing.play(); } catch(e) {}
            } else if (!gameActive && !questionMode && waitingForStart) {
                loadNewQuestion();
            }
        }, { passive: false });
        
        // Oyunu başlat - ilk soruyu yükle
        window.onload = () => {
            setTimeout(() => {
                loadNewQuestion();
            }, 500);
        };
        
        gameLoop();
    </script>
</body>
</html>
