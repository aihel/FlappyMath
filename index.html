<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
    <title>Flappy Math - OmerAsaf</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }

        /* DEV EKRAN - Akıllı tahta için büyütüldü */
        #gameCanvas {
            width: min(100vh * 0.5625, 100vw);
            height: min(100vw * 1.777, 100vh);
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
            touch-action: none;
            background: #000;
            box-shadow: 0 0 50px rgba(255,215,0,0.3);
            display: block;
            margin: auto;
            border: 2px solid #ffd70033;
        }

        #infoBtn {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 60px;  /* Büyütüldü */
            height: 60px; /* Büyütüldü */
            background: rgba(255,255,255,0.95);
            border: 4px solid #333;
            border-radius: 50%;
            font-size: 32px; /* Büyütüldü */
            font-weight: bold;
            color: #333;
            cursor: pointer;
            z-index: 30;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }

        #infoBtn:active {
            transform: scale(0.9);
            background: #ffd700;
        }

        #infoMessage {
            position: absolute;
            top: 100px;
            left: 20px;
            background: rgba(0,0,0,0.85);
            color: #ffd700;
            padding: 20px 30px; /* Büyütüldü */
            border-radius: 50px;
            font-size: 24px; /* Büyütüldü */
            font-weight: bold;
            z-index: 25;
            display: none;
            border-left: 6px solid #ffd700;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
            animation: slideIn 0.3s;
        }

        @keyframes slideIn {
            from { transform: translateX(-30px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* DEV SKOR - Akıllı tahta için büyütüldü */
        #scoreContainer {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px; /* Büyütüldü */
            z-index: 10;
            background: rgba(0,0,0,0.6);
            padding: 20px 40px; /* Büyütüldü */
            border-radius: 80px; /* Büyütüldü */
            backdrop-filter: blur(8px);
            border: 4px solid rgba(255,215,0,0.8);
            box-shadow: 0 8px 30px rgba(0,0,0,0.7);
        }

        .score-digit {
            width: 80px;  /* ÇOK BÜYÜTÜLDÜ (eski 40px) */
            height: 120px; /* ÇOK BÜYÜTÜLDÜ (eski 60px) */
            image-rendering: pixelated;
            filter: drop-shadow(0 8px 8px rgba(0,0,0,0.7));
            object-fit: contain;
        }

        /* DEV SORU PANELİ - Akıllı tahta için büyütüldü */
        #questionPanel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: min(90%, 800px); /* Büyütüldü (eski 500px) */
            max-height: 85vh;
            background: linear-gradient(145deg, #1a2f3f, #0f1a24);
            z-index: 100;
            display: none;
            flex-direction: column;
            padding: 50px 45px; /* Büyütüldü */
            color: white;
            overflow-y: auto;
            animation: fadeIn 0.3s;
            border-radius: 60px; /* Büyütüldü */
            border: 6px solid #ffd700; /* Büyütüldü */
            box-shadow: 0 30px 60px rgba(0,0,0,0.9), 0 0 60px #ffd70066;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translate(-50%, -40%); }
            to { opacity: 1; transform: translate(-50%, -50%); }
        }

        #questionHeader {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        #questionType {
            background: #ffd700;
            color: #1a2f3f;
            padding: 15px 30px; /* Büyütüldü */
            border-radius: 50px;
            font-size: 28px; /* Büyütüldü */
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #questionCount {
            background: rgba(255,255,255,0.15);
            padding: 15px 30px; /* Büyütüldü */
            border-radius: 50px;
            font-size: 26px; /* Büyütüldü */
            border: 2px solid rgba(255,255,255,0.2);
        }

        #questionText {
            font-size: 32px; /* BÜYÜTÜLDÜ */
            line-height: 1.5;
            margin-bottom: 40px;
            padding: 30px; /* Büyütüldü */
            background: rgba(255,255,255,0.08);
            border-radius: 30px;
            border-left: 8px solid #ffd700;
            font-weight: 500;
            word-wrap: break-word;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 20px; /* Büyütüldü */
            margin: 25px 0 40px;
        }

        .option-btn {
            background: rgba(255,255,255,0.1);
            border: 4px solid rgba(255,255,255,0.15);
            color: white;
            padding: 30px 35px; /* BÜYÜTÜLDÜ */
            border-radius: 80px; /* Büyütüldü */
            font-size: 36px; /* BÜYÜTÜLDÜ */
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            letter-spacing: 1px;
            backdrop-filter: blur(5px);
            box-shadow: 0 8px 12px rgba(0,0,0,0.2);
        }

        .option-btn:active {
            transform: scale(0.98);
        }

        .option-btn.correct-highlight {
            background: rgba(46, 204, 113, 0.3);
            border-color: #2ecc71;
            box-shadow: 0 0 30px rgba(46, 204, 113, 0.5);
        }

        .option-btn.selected-correct {
            background: linear-gradient(145deg, #27ae60, #2ecc71);
            border-color: #fff;
            transform: scale(1.02);
            box-shadow: 0 0 30px #2ecc71;
        }

        .option-btn.selected-wrong {
            background: linear-gradient(145deg, #c0392b, #e74c3c);
            border-color: #fff;
        }

        #solutionText {
            margin: 25px 0;
            padding: 30px; /* Büyütüldü */
            background: rgba(52, 152, 219, 0.2);
            border-left: 8px solid #3498db;
            border-radius: 20px;
            font-size: 28px; /* BÜYÜTÜLDÜ */
            line-height: 1.6;
            display: none;
            backdrop-filter: blur(5px);
            animation: slideUp 0.3s;
            word-wrap: break-word;
        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        #nextQuestionBtn {
            margin-top: 15px;
            padding: 30px; /* BÜYÜTÜLDÜ */
            border: none;
            border-radius: 80px;
            font-size: 32px; /* BÜYÜTÜLDÜ */
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            display: none;
            background: linear-gradient(145deg, #f39c12, #ffd700);
            color: #1a2f3f;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #startGameBtn {
            margin-top: 15px;
            padding: 35px; /* BÜYÜTÜLDÜ */
            border: none;
            border-radius: 80px;
            font-size: 40px; /* BÜYÜTÜLDÜ */
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            display: none;
            background: linear-gradient(145deg, #2ecc71, #27ae60);
            color: white;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            text-transform: uppercase;
            letter-spacing: 3px;
            border: 6px solid #ffd700;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }

        #nextQuestionBtn:active, #startGameBtn:active {
            transform: scale(0.95);
        }

        /* DEV GAME OVER */
        #gameoverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 50;
            display: none;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
        }

        #gameoverImage {
            width: min(80%, 700px); /* BÜYÜTÜLDÜ */
            image-rendering: pixelated;
            animation: gameoverPulse 2s infinite;
        }

        @keyframes gameoverPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* DEV MENÜ */
        #menuScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            z-index: 40;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 30px;
        }

        #menuTitle {
            font-size: min(120px, 15vw); /* ÇOK BÜYÜK */
            font-weight: bold;
            color: #ffd700;
            text-shadow: 6px 6px 0 #000, 12px 12px 0 rgba(0,0,0,0.5);
            margin-bottom: 30px;
            font-family: 'Arial Black', sans-serif;
            letter-spacing: 8px;
            animation: titlePulse 2s infinite;
            text-align: center;
            line-height: 1.2;
        }

        @keyframes titlePulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        #menuSubtitle {
            font-size: min(48px, 6vw); /* BÜYÜK */
            color: white;
            margin-bottom: 60px;
            background: rgba(255,215,0,0.2);
            padding: 20px 50px;
            border-radius: 80px;
            border: 4px solid #ffd700;
            text-align: center;
        }

        #menuButton {
            padding: 30px 80px; /* BÜYÜTÜLDÜ */
            font-size: min(56px, 8vw); /* BÜYÜTÜLDÜ */
            font-weight: bold;
            background: linear-gradient(145deg, #2ecc71, #27ae60);
            color: white;
            border: none;
            border-radius: 100px;
            cursor: pointer;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), 0 0 60px #ffd700;
            border: 6px solid #ffd700;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 4px;
            white-space: nowrap;
        }

        #menuButton:active {
            transform: scale(0.95);
        }

        /* Yatay mod zorunlu */
        @media (orientation: portrait) {
            #gameCanvas, #infoBtn, #scoreContainer, #questionPanel, #gameoverScreen, #menuScreen {
                display: none !important;
            }
            
            #gameContainer::after {
                content: "📱 LÜTFEN YATAY MODA GEÇİN 📱";
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                color: #ffd700;
                font-size: min(48px, 8vw);
                font-weight: bold;
                text-align: center;
                background: rgba(0,0,0,0.95);
                padding: 50px 30px;
                border-radius: 50px;
                border: 6px solid #ffd700;
                z-index: 200;
                width: 90%;
                max-width: 800px;
                box-shadow: 0 0 80px #ffd700;
                animation: warningPulse 1s infinite;
                line-height: 1.4;
            }

            @keyframes warningPulse {
                0% { box-shadow: 0 0 40px #ffd700; }
                50% { box-shadow: 0 0 80px #ffd700; }
                100% { box-shadow: 0 0 40px #ffd700; }
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="288" height="512"></canvas>
        <div id="infoBtn" onclick="showInfo()">İ</div>
        <div id="infoMessage">OmerAsaf tarafından geliştirildi</div>
        
        <!-- DEV SKOR -->
        <div id="scoreContainer"></div>
        
        <!-- DEV MENÜ -->
        <div id="menuScreen">
            <div id="menuTitle">FLAPPY MATH</div>
            <div id="menuSubtitle">7. Sınıf - Doğru/Ters Orantı</div>
            <button id="menuButton" onclick="startMenuGame()">OYUNA BAŞLA</button>
        </div>
        
        <div id="gameoverScreen">
            <img id="gameoverImage" src="sprites/gameover.png" alt="Game Over">
        </div>
        
        <!-- DEV SORU PANELİ -->
        <div id="questionPanel">
            <div id="questionHeader">
                <span id="questionType"></span>
                <span id="questionCount"></span>
            </div>
            <div id="questionText"></div>
            <div class="options-container" id="optionsContainer"></div>
            <div id="solutionText"></div>
            <button id="nextQuestionBtn" onclick="loadNewQuestion()">BAŞKA SORUYA GEÇ →</button>
            <button id="startGameBtn" onclick="startGameFromQuestion()">🚀 OYUNU BAŞLAT</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Oyun değişkenleri
        let gameActive = false;
        let questionMode = false;
        let menuVisible = true;
        let score = 0;
        let correctAnswered = false;
        let gameoverVisible = false;
        
        // Sabitler
        const GAME_WIDTH = 288;
        const GAME_HEIGHT = 512;
        
        let bird = {
            x: 60,
            y: 250,
            width: 34,
            height: 24,
            velocity: 0,
            gravity: 0.2,
            jump: -4.8,
            frame: 0
        };
        
        let pipes = [];
        const PIPE_WIDTH = 52;
        const PIPE_GAP = 130;
        let frameCount = 0;
        let nightMode = false;
        let baseX = 0;
        
        // Soru havuzu (100 soru)
        const questions = [];
        for (let i = 1; i <= 100; i++) {
            if (i % 3 === 0) {
                const a = Math.floor(Math.random() * 5) + 2;
                const b = Math.floor(Math.random() * 5) + 3;
                const correct = ((b * 10) / a).toFixed(1);
                questions.push({
                    id: i,
                    text: `${a} metre kumaş ${b * 10} TL ise, 1 metre kumaş kaç TL'dir? (Doğru Orantı)`,
                    type: 'doğru orantı',
                    correct: correct,
                    solution: `${a} metre → ${b * 10} TL ise, 1 metre → ${b * 10} ÷ ${a} = ${correct} TL`
                });
            } else if (i % 3 === 1) {
                const a = Math.floor(Math.random() * 4) + 3;
                const b = Math.floor(Math.random() * 4) + 4;
                const day = Math.floor(Math.random() * 6) + 6;
                const correct = ((a * day) / b).toFixed(1);
                questions.push({
                    id: i,
                    text: `${a} usta bir duvarı ${day} günde örüyor. Aynı duvarı ${b} usta kaç günde örer? (Ters Orantı)`,
                    type: 'ters orantı',
                    correct: correct,
                    solution: `${a} usta × ${day} gün = ${a * day} iş. ${b} usta → ${a * day} ÷ ${b} = ${correct} gün`
                });
            } else {
                const a = Math.floor(Math.random() * 4) + 3;
                const b = Math.floor(Math.random() * 3) + 4;
                const gun1 = 12;
                const c = Math.floor(Math.random() * 3) + 4;
                const saat2 = 8;
                const sabit = a * b * gun1;
                const correct = (sabit / (c * saat2)).toFixed(1);
                questions.push({
                    id: i,
                    text: `${a} işçi günde ${b} saat çalışarak bir işi ${gun1} günde bitiriyor. Aynı işi ${c} işçi günde ${saat2} saat çalışarak kaç günde bitirir? (Ters Orantı)`,
                    type: 'ters orantı',
                    correct: correct,
                    solution: `${a}×${b}×${gun1} = ${sabit} (toplam iş). ${c}×${saat2}×x = ${sabit} → x = ${correct}`
                });
            }
        }
        
        // Sorulara rastgele şıklar ekle
        questions.forEach(q => {
            const correct = parseFloat(q.correct);
            const wrong1 = (correct + (Math.random() * 2 + 0.5)).toFixed(1);
            const wrong2 = (correct - (Math.random() * 1.5 + 0.2)).toFixed(1);
            const wrong3 = (correct + (Math.random() * 3 + 1)).toFixed(1);
            
            let options = [correct.toString(), wrong1, wrong2, wrong3];
            options = options.sort(() => Math.random() - 0.5);
            q.options = options;
        });
        
        // Soru takibi
        let askedQuestions = new Set();
        let currentQuestion = null;
        let selectedOption = null;
        let showSolution = false;
        
        // Sesler
        const sounds = {
            die: new Audio(),
            hit: new Audio(),
            point: new Audio(),
            wing: new Audio()
        };
        
        function loadSounds() {
            try {
                sounds.die.src = 'audio/die.ogg';
                sounds.hit.src = 'audio/hit.ogg';
                sounds.point.src = 'audio/point.ogg';
                sounds.wing.src = 'audio/wing.ogg';
                
                Object.values(sounds).forEach(sound => {
                    sound.load();
                    sound.volume = 0.5;
                });
            } catch(e) {
                console.warn('Sesler yüklenemedi:', e);
            }
        }
        loadSounds();
        
        // Asset'ler
        const assets = {
            backgroundDay: new Image(),
            backgroundNight: new Image(),
            base: new Image(),
            birdDown: new Image(),
            birdMid: new Image(),
            birdUp: new Image(),
            pipeGreen: new Image(),
            pipeRed: new Image(),
            message: new Image(),
            gameover: new Image()
        };
        
        // Skor PNG'leri
        const scoreDigits = [];
        for (let i = 0; i <= 9; i++) {
            const img = new Image();
            img.src = `sprites/${i}.png`;
            scoreDigits.push(img);
        }
        
        assets.backgroundDay.src = 'sprites/background-day.png';
        assets.backgroundNight.src = 'sprites/background-night.png';
        assets.base.src = 'sprites/base.png';
        assets.birdDown.src = 'sprites/bluebird-downflap.png';
        assets.birdMid.src = 'sprites/bluebird-midflap.png';
        assets.birdUp.src = 'sprites/bluebird-upflap.png';
        assets.pipeGreen.src = 'sprites/pipe-green.png';
        assets.pipeRed.src = 'sprites/pipe-red.png';
        assets.message.src = 'sprites/message.png';
        assets.gameover.src = 'sprites/gameover.png';
        
        assets.gameover.onload = () => {
            document.getElementById('gameoverImage').src = assets.gameover.src;
        };
        
        // Skoru güncelle
        function updateScoreDisplay() {
            const container = document.getElementById('scoreContainer');
            container.innerHTML = '';
            
            const scoreStr = score.toString();
            for (let i = 0; i < scoreStr.length; i++) {
                const digit = parseInt(scoreStr[i]);
                const img = document.createElement('img');
                img.src = `sprites/${digit}.png`;
                img.className = 'score-digit';
                img.alt = digit;
                container.appendChild(img);
            }
        }
        
        function showInfo() {
            const msg = document.getElementById('infoMessage');
            msg.style.display = 'block';
            setTimeout(() => {
                msg.style.display = 'none';
            }, 2000);
        }
        
        function startMenuGame() {
            menuVisible = false;
            document.getElementById('menuScreen').style.display = 'none';
            loadNewQuestion();
        }
        
        function loadNewQuestion() {
            const available = questions.filter(q => !askedQuestions.has(q.id));
            
            if (available.length === 0) {
                askedQuestions.clear();
                currentQuestion = questions[Math.floor(Math.random() * questions.length)];
            } else {
                currentQuestion = available[Math.floor(Math.random() * available.length)];
            }
            
            askedQuestions.add(currentQuestion.id);
            
            document.getElementById('questionType').textContent = `📐 ${currentQuestion.type.toUpperCase()}`;
            document.getElementById('questionCount').textContent = `📊 ${askedQuestions.size}/100`;
            document.getElementById('questionText').textContent = currentQuestion.text;
            
            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';
            
            currentQuestion.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = `${String.fromCharCode(65 + index)}) ${opt}`;
                btn.onclick = () => selectOption(index, opt);
                optionsContainer.appendChild(btn);
            });
            
            document.getElementById('solutionText').style.display = 'none';
            document.getElementById('nextQuestionBtn').style.display = 'none';
            document.getElementById('startGameBtn').style.display = 'none';
            
            selectedOption = null;
            showSolution = false;
            correctAnswered = false;
            
            document.getElementById('questionPanel').style.display = 'flex';
            questionMode = true;
            gameActive = false;
            gameoverVisible = false;
            document.getElementById('gameoverScreen').style.display = 'none';
        }
        
        function selectOption(index, value) {
            if (showSolution) return;
            
            selectedOption = index;
            const isCorrect = (parseFloat(value) === parseFloat(currentQuestion.correct));
            
            const optionBtns = document.querySelectorAll('.option-btn');
            
            optionBtns.forEach((btn, i) => {
                btn.classList.remove('selected-correct', 'selected-wrong', 'correct-highlight');
                
                if (parseFloat(currentQuestion.options[i]) === parseFloat(currentQuestion.correct)) {
                    btn.classList.add('correct-highlight');
                }
                
                if (i === index) {
                    if (isCorrect) {
                        btn.classList.add('selected-correct');
                    } else {
                        btn.classList.add('selected-wrong');
                    }
                }
            });
            
            showSolution = true;
            const solutionDiv = document.getElementById('solutionText');
            solutionDiv.innerHTML = `📝 ${currentQuestion.solution}`;
            solutionDiv.style.display = 'block';
            
            if (isCorrect) {
                correctAnswered = true;
                document.getElementById('startGameBtn').style.display = 'block';
                document.getElementById('nextQuestionBtn').style.display = 'none';
                
                try { sounds.point.play(); } catch(e) {}
            } else {
                correctAnswered = false;
                document.getElementById('nextQuestionBtn').style.display = 'block';
                document.getElementById('startGameBtn').style.display = 'none';
                
                try { sounds.hit.play(); } catch(e) {}
            }
        }
        
        function startGameFromQuestion() {
            if (correctAnswered) {
                document.getElementById('questionPanel').style.display = 'none';
                questionMode = false;
                gameActive = true;
                
                reset();
            }
        }
        
        function reset() {
            bird.y = 250;
            bird.velocity = 0;
            pipes = [];
            score = 0;
            frameCount = 0;
            nightMode = false;
            baseX = 0;
            correctAnswered = false;
            updateScoreDisplay();
        }
        
        function gameOver() {
            gameActive = false;
            correctAnswered = false;
            
            try { sounds.die.play(); } catch(e) {}
            
            gameoverVisible = true;
            document.getElementById('gameoverScreen').style.display = 'flex';
            
            setTimeout(() => {
                if (gameoverVisible) {
                    document.getElementById('gameoverScreen').style.display = 'none';
                    loadNewQuestion();
                }
            }, 2000);
        }
        
        function update() {
            if (!gameActive || questionMode || menuVisible) return;
            
            bird.velocity += bird.gravity;
            bird.y += bird.velocity;
            bird.frame = (bird.frame + 1) % 30;
            
            frameCount++;
            if (frameCount % 100 === 0) {
                const pipeY = Math.random() * -180;
                pipes.push({
                    x: GAME_WIDTH,
                    y: pipeY,
                    passed: false
                });
            }
            
            for (let i = pipes.length - 1; i >= 0; i--) {
                pipes[i].x -= 2.5;
                
                if (!pipes[i].passed && pipes[i].x + PIPE_WIDTH < bird.x) {
                    pipes[i].passed = true;
                    score++;
                    updateScoreDisplay();
                    
                    try { sounds.point.play(); } catch(e) {}
                    
                    if (score % 5 === 0) {
                        nightMode = !nightMode;
                    }
                }
                
                if (pipes[i].x + PIPE_WIDTH < 0) {
                    pipes.splice(i, 1);
                }
            }
            
            baseX = (baseX - 2) % 336;
            
            if (bird.y + bird.height >= GAME_HEIGHT - 112 || bird.y <= 0) {
                gameOver();
                return;
            }
            
            for (let pipe of pipes) {
                if (bird.x < pipe.x + PIPE_WIDTH &&
                    bird.x + bird.width > pipe.x &&
                    bird.y < pipe.y + 320 &&
                    bird.y + bird.height > pipe.y) {
                    gameOver();
                    return;
                }
                
                if (bird.x < pipe.x + PIPE_WIDTH &&
                    bird.x + bird.width > pipe.x &&
                    bird.y < pipe.y + 320 + PIPE_GAP + 320 &&
                    bird.y + bird.height > pipe.y + 320 + PIPE_GAP) {
                    gameOver();
                    return;
                }
            }
        }
        
        function draw() {
            ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
            ctx.drawImage(nightMode ? assets.backgroundNight : assets.backgroundDay, 0, 0, GAME_WIDTH, GAME_HEIGHT);
            
            for (let pipe of pipes) {
                const pipeImg = nightMode ? assets.pipeRed : assets.pipeGreen;
                
                ctx.save();
                ctx.translate(pipe.x + PIPE_WIDTH/2, pipe.y + 160);
                ctx.scale(1, -1);
                ctx.drawImage(pipeImg, -PIPE_WIDTH/2, -160, PIPE_WIDTH, 320);
                ctx.restore();
                
                ctx.drawImage(pipeImg, pipe.x, pipe.y + 320 + PIPE_GAP, PIPE_WIDTH, 320);
            }
            
            ctx.drawImage(assets.base, baseX, GAME_HEIGHT - 112, 336, 112);
            ctx.drawImage(assets.base, baseX + 336, GAME_HEIGHT - 112, 336, 112);
            
            let birdImage;
            if (bird.frame < 10) birdImage = assets.birdDown;
            else if (bird.frame < 20) birdImage = assets.birdMid;
            else birdImage = assets.birdUp;
            
            ctx.save();
            ctx.translate(bird.x + bird.width/2, bird.y + bird.height/2);
            ctx.rotate(Math.min(Math.max(bird.velocity * 0.03, -0.4), 0.4));
            ctx.drawImage(birdImage, -bird.width/2, -bird.height/2, bird.width, bird.height);
            ctx.restore();
        }
        
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = GAME_WIDTH / rect.width;
            const scaleY = GAME_HEIGHT / rect.height;
            const x = (e.clientX - rect.left) * scaleX;
            const y = (e.clientY - rect.top) * scaleY;
            
            if (x < 100 && y < 100) { // İ butonu için geniş alan
                showInfo();
                return;
            }
            
            if (gameActive && !questionMode && !menuVisible) {
                bird.velocity = bird.jump;
                try { sounds.wing.play(); } catch(e) {}
            }
        });
        
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const scaleX = GAME_WIDTH / rect.width;
            const scaleY = GAME_HEIGHT / rect.height;
            const x = (touch.clientX - rect.left) * scaleX;
            const y = (touch.clientY - rect.top) * scaleY;
            
            if (x < 100 && y < 100) {
                showInfo();
                return;
            }
            
            if (gameActive && !questionMode && !menuVisible) {
                bird.velocity = bird.jump;
                try { sounds.wing.play(); } catch(e) {}
            }
        }, { passive: false });
        
        // Menüyü göster
        document.getElementById('menuScreen').style.display = 'flex';
        
        gameLoop();
    </script>
</body>
</html>
