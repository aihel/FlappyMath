<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FlappyMath - 7. Sınıf Orantı Oyunu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(145deg, #0a2f3a 0%, #05161e 100%);
            font-family: 'Courier New', 'VT323', monospace;
            touch-action: manipulation;
        }

        .game-container {
            position: relative;
            box-shadow: 0 20px 35px rgba(0,0,0,0.4), inset 0 0 0 2px rgba(255,255,255,0.1);
            border-radius: 20px;
            background: #000;
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
            border-radius: 18px;
            cursor: pointer;
        }

        /* UI panelleri */
        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .score-panel {
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 48px;
            font-weight: bold;
            color: white;
            text-shadow: 3px 3px 0 #000000aa;
            font-family: monospace;
            letter-spacing: 2px;
            pointer-events: none;
            background: rgba(0,0,0,0.4);
            display: inline-block;
            width: fit-content;
            margin: 0 auto;
            padding: 8px 20px;
            border-radius: 60px;
            backdrop-filter: blur(4px);
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
        }

        .question-modal {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(6px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
            pointer-events: auto;
            transition: all 0.2s ease;
            font-family: 'Segoe UI', 'Courier New', monospace;
        }

        .question-card {
            background: #fef9e8;
            width: 85%;
            max-width: 380px;
            border-radius: 48px;
            padding: 28px 22px 32px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border: 3px solid #ffcd7e;
            animation: bouncePop 0.3s cubic-bezier(0.34,1.2,0.8,1);
        }

        @keyframes bouncePop {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .question-card h2 {
            font-size: 28px;
            background: #ffb347;
            display: inline-block;
            padding: 5px 18px;
            border-radius: 50px;
            color: white;
            margin-bottom: 20px;
        }

        .question-text {
            font-size: 26px;
            font-weight: bold;
            margin: 25px 0;
            color: #2c3e2f;
            line-height: 1.4;
            background: #fff0d4;
            padding: 18px;
            border-radius: 40px;
        }

        .options {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            justify-content: center;
            margin: 20px 0 15px;
        }

        .opt-btn {
            background: #2c5f2d;
            border: none;
            font-size: 26px;
            font-weight: bold;
            padding: 12px 20px;
            min-width: 100px;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 5px 0 #1d3e1a;
            font-family: monospace;
        }

        .opt-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #1d3e1a;
        }

        .restart-hint {
            margin-top: 12px;
            font-size: 14px;
            color: #7e5e3a;
            background: #ffe2b5;
            border-radius: 30px;
            padding: 6px;
        }

        .message-start {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: none;
            background: rgba(0,0,0,0.7);
            padding: 15px 25px;
            border-radius: 60px;
            color: gold;
            font-weight: bold;
            font-size: 24px;
            white-space: nowrap;
            font-family: monospace;
            z-index: 15;
        }

        .hide {
            display: none;
        }

        @media (max-width: 550px) {
            .score-panel { font-size: 36px; top: 12px; padding: 4px 18px;}
            .question-text { font-size: 20px; }
            .opt-btn { font-size: 22px; padding: 8px 16px; min-width: 80px; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    <div class="ui-overlay">
        <div class="score-panel" id="scoreDisplay">0</div>
        <div id="startMessage" class="message-start">🕹️ DOKUN / TIKLA BAŞLA 🕹️</div>
    </div>
    <div id="questionModal" class="question-modal hide">
        <div class="question-card">
            <h2>📐 MATEMATİK</h2>
            <div class="question-text" id="questionText">Soru yükleniyor...</div>
            <div class="options" id="optionsContainer"></div>
            <div class="restart-hint">✨ Doğru cevap ver, yeni kuş uçsun! ✨</div>
        </div>
    </div>
</div>

<script>
    (function(){
        // ------------------- ASSETLER (Sprite haritası doğrudan base64 yedeği değil, ama URL.createObjectURL kullanmadan direk resim yolu: 
        // gerçek projede dosyalar yan yana. index.html ile aynı dizinde "sprites" ve "audio" klasörleri mevcut. 
        // Tüm assetleri kullanıyoruz. Ayrıca sayı sprite'ları 0.png ... 9.png ve A.png skor için vs. Haberin olsun.
        // Oyun içinde skor rakamlarını göstermek için canvas üzerine çizim yaparken sayı sprite'larını kullanıyoruz.
        
        // Canvas ayarları
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Oyun sabitleri
        const W = 400, H = 600;
        const GRAVITY = 0.2;
        const JUMP_FORCE = -5.2;
        const PIPE_WIDTH = 52;
        const PIPE_GAP = 140;
        const PIPE_SPACING = 220;
        const BIRD_SIZE = 34;
        
        // Oyun durumları
        let gameState = 'start'; // start, playing, gameover, question
        let score = 0;
        let frame = 0;
        let bird = { x: 70, y: H/2, vy: 0, rotation: 0 };
        let pipes = [];
        let bgOffset = 0;
        let groundX = 0;
        
        // Ses nesneleri (assets/audio klasöründe mevcut)
        const audioFiles = {
            wing: new Audio('audio/wing.wav'),
            point: new Audio('audio/point.wav'),
            hit: new Audio('audio/hit.wav'),
            die: new Audio('audio/die.wav'),
            swoosh: new Audio('audio/swoosh.wav')
        };
        // Seslerin ön yüklemesi
        for(let key in audioFiles){
            audioFiles[key].load();
            audioFiles[key].volume = 0.5;
        }
        
        function playSound(soundId){
            try{
                let snd = audioFiles[soundId];
                if(snd){
                    snd.currentTime = 0;
                    snd.play().catch(e=>console.log("ses engeli",e));
                }
            }catch(e){}
        }
        
        // ------------------- GÖRSEL SPRITE YÜKLEME (sprites klasörü)
        const spriteImages = {};
        const spriteNames = [
            'background-day', 'background-night', 'base',
            'bluebird-downflap', 'bluebird-midflap', 'bluebird-upflap',
            'redbird-downflap', 'redbird-midflap', 'redbird-upflap',
            'yellowbird-downflap', 'yellowbird-midflap', 'yellowbird-upflap',
            'pipe-green', 'pipe-red', 'gameover', 'message'
        ];
        // sayı sprite'ları 0-9 ve A
        for(let i=0;i<=9;i++) spriteNames.push(`${i}`);
        spriteNames.push('A');
        
        let loadedAssets = 0;
        let totalAssets = spriteNames.length;
        let assetsReady = false;
        
        function loadSprites(){
            for(let name of spriteNames){
                const img = new Image();
                img.onload = () => { loadedAssets++; if(loadedAssets === totalAssets) assetsReady = true; };
                img.onerror = () => { loadedAssets++; if(loadedAssets === totalAssets) assetsReady = true; };
                // dosya yolları sprites/ adı.png (A.png, 0.png vb)
                img.src = `sprites/${name}.png`;
                spriteImages[name] = img;
            }
        }
        loadSprites();
        
        // Kuş rengi: sarı (yellowbird) kullan
        let birdAnimFrame = 0;
        const birdVariants = ['yellowbird-upflap', 'yellowbird-midflap', 'yellowbird-downflap'];
        
        // ------------------- MATEMATİK SORU BANKASI (7.sınıf doğru orantı - ters orantı) 90+ soru
        const questionBank = [];
        
        function generateQuestions(){
            // 90 soru üret: Doğru Orantı (DO) ve Ters Orantı (TO) karışık
            const ornekler = [
                {text:"3 kg elma 18 TL ise 5 kg elma kaç TL'dir? (Doğru Orantı)", answer:30, type:"DO"},
                {text:"Bir işi 6 işçi 10 günde bitiriyorsa, 12 işçi kaç günde bitirir? (Ters Orantı)", answer:5, type:"TO"},
                {text:"Bir aracın hızı 80 km/sa iken 5 saatte gittiği yolu, 100 km/sa hızla kaç saatte gider? (Ters)", answer:4, type:"TO"},
                {text:"4 kalem 28 TL ise 7 kalem kaç TL'dir? (Doğru)", answer:49, type:"DO"},
                {text:"20 işçi bir duvarı 8 günde örerse, 16 işçi kaç günde örer? (Ters)", answer:10, type:"TO"},
                {text:"Bir musluk 6 saatte havuzu dolduruyorsa, aynı debide 4 musluk kaç saatte doldurur? (Ters)", answer:1.5, type:"TO", isDecimal:true},
                {text:"2 saatte 120 km yol giden araç, 5 saatte kaç km yol gider? (Doğru)", answer:300, type:"DO"},
                {text:"Bir otobüs 90 km/sa ile 4 saatte gittiği yolu 120 km/sa ile kaç saatte gider? (Ters)", answer:3, type:"TO"},
                {text:"5 kg fındık 200 TL ise 8 kg fındık kaç TL? (Doğru)", answer:320, type:"DO"},
                {text:"8 işçi 15 günde yaparsa, 10 işçi kaç günde yapar? (Ters)", answer:12, type:"TO"},
                {text:"12 m kumaş 360 TL ise 7 m kumaş kaç TL? (Doğru)", answer:210, type:"DO"},
                {text:"Bir havuzu 4 pompa 9 saatte doldurursa, 6 pompa kaç saatte doldurur? (Ters)", answer:6, type:"TO"},
                {text:"3 kg portakaldan 1.2 L meyve suyu çıkıyorsa, 5 kg portakaldan kaç L meyve suyu çıkar? (Doğru)", answer:2, type:"DO", isDecimal:true},
                {text:"Bir usta 8 saatte 64 parça iş yapıyorsa 5 saatte kaç parça yapar? (Doğru)", answer:40, type:"DO"}
            ];
            // 90 soru oluşturmak için varyasyonlar + otomatik türetme
            for(let i=0; i<95; i++){
                let base = ornekler[i % ornekler.length];
                let newText = base.text;
                let newAnswer = base.answer;
                let type = base.type;
                // rastgele sayı değiştirerek 90+ soru
                if(i>= ornekler.length){
                    let r = (i*7)%12+2;
                    if(type==="DO"){
                        if(base.text.includes("3 kg")){
                            newText = `${r} kg elma ${r*6} TL ise ${r+2} kg elma kaç TL? (Doğru Orantı)`;
                            newAnswer = (r+2)*6;
                        }else if(base.text.includes("4 kalem")){
                            newText = `${r} kalem ${r*7} TL ise ${r+3} kalem kaç TL?`;
                            newAnswer = (r+3)*7;
                        }else{
                            newText = `${r} kg fındık ${r*40} TL ise ${r+3} kg fındık kaç TL?`;
                            newAnswer = (r+3)*40;
                        }
                    } else {
                        if(base.text.includes("6 işçi")){
                            newText = `${r} işçi 10 günde bitiriyorsa, ${r*2} işçi kaç günde bitirir? (Ters Orantı)`;
                            newAnswer = (r*10)/(r*2);
                        }else{
                            newText = `Hızı ${r*20} km/sa iken 4 saatte giden yol, ${r*25} km/sa ile kaç saat?`;
                            newAnswer = (r*20*4)/(r*25);
                        }
                    }
                    if(!Number.isInteger(newAnswer)) newAnswer = parseFloat(newAnswer.toFixed(1));
                }
                let answerVal = newAnswer;
                let optionsSet = new Set([answerVal]);
                while(optionsSet.size < 4){
                    let variation = answerVal + (Math.floor(Math.random()*13)-6);
                    if(variation <= 0) variation = answerVal+1;
                    if(variation !== answerVal) optionsSet.add(Math.abs(variation));
                }
                let opts = Array.from(optionsSet).sort(()=>Math.random()-0.5);
                questionBank.push({
                    id: i,
                    text: newText,
                    correct: answerVal,
                    options: opts,
                    isDecimal: (answerVal % 1 !== 0)
                });
            }
            // kesin 90+ olacak şekilde doldur
            while(questionBank.length < 92){
                questionBank.push({...questionBank[0]});
            }
        }
        generateQuestions();
        
        let currentQuestion = null;
        let pendingGameRestart = false;
        
        // Yeni soru getir (rastgele)
        function getRandomQuestion(){
            let idx = Math.floor(Math.random() * questionBank.length);
            return {...questionBank[idx]};
        }
        
        function showQuestionModal(){
            gameState = 'question';
            const modal = document.getElementById('questionModal');
            const questionTextDiv = document.getElementById('questionText');
            const optionsDiv = document.getElementById('optionsContainer');
            currentQuestion = getRandomQuestion();
            let qText = currentQuestion.text;
            if(currentQuestion.isDecimal){
                qText += " (Ondalıklı cevap)";
            }
            questionTextDiv.innerText = qText;
            optionsDiv.innerHTML = '';
            currentQuestion.options.forEach(opt => {
                let btn = document.createElement('button');
                btn.className = 'opt-btn';
                let displayVal = (opt % 1 !== 0) ? opt.toFixed(1) : opt;
                btn.innerText = displayVal;
                btn.onclick = (e) => {
                    e.stopPropagation();
                    let userAnswer = opt;
                    let correctVal = currentQuestion.correct;
                    let isCorrect = (Math.abs(userAnswer - correctVal) < 0.01);
                    if(isCorrect){
                        playSound('swoosh');
                        modal.classList.add('hide');
                        // oyun sıfırlanıp başlatılacak (yeni oyun)
                        resetGameForNewRun();
                        gameState = 'playing';
                        document.getElementById('startMessage').classList.add('hide');
                    } else {
                        // yanlış cevap: hit sesi ve aynı modda kal, tekrar dene ama yeni soru gelmesin daha iyi: aynı soru kalabilir
                        playSound('hit');
                        alert("❌ Yanlış cevap! Tekrar dene.❌");
                        // aynı soruyla devam
                    }
                };
                optionsDiv.appendChild(btn);
            });
            modal.classList.remove('hide');
        }
        
        function resetGameForNewRun(){
            score = 0;
            updateScoreUI();
            bird.y = H/2;
            bird.vy = 0;
            bird.rotation = 0;
            pipes = [];
            frame = 0;
            bgOffset = 0;
            groundX = 0;
            generateInitialPipes();
        }
        
        function generateInitialPipes(){
            pipes = [];
            for(let i=0; i<3; i++){
                let pipeX = W + i * PIPE_SPACING;
                let pipeY = Math.random() * (H - PIPE_GAP - 100) + 50;
                pipes.push({ x: pipeX, y: pipeY, counted: false });
            }
        }
        
        function updateScoreUI(){
            document.getElementById('scoreDisplay').innerText = score;
        }
        
        function gameOver(){
            if(gameState !== 'playing') return;
            gameState = 'gameover';
            playSound('hit');
            playSound('die');
            document.getElementById('startMessage').innerHTML = '💀 GAME OVER 💀<br>💡 Soruyu çözerek yeniden başla!';
            document.getElementById('startMessage').classList.remove('hide');
            // Soru modalını göster
            showQuestionModal();
        }
        
        // Oyun mantık güncellemesi
        function updateGame(){
            if(gameState !== 'playing') return;
            // kuş fiziği
            bird.vy += GRAVITY;
            bird.y += bird.vy;
            if(bird.y + BIRD_SIZE/2 > H - 50) {
                bird.y = H - 50 - BIRD_SIZE/2;
                gameOver();
            }
            if(bird.y - BIRD_SIZE/2 < 0){
                bird.y = BIRD_SIZE/2;
                bird.vy = 0;
            }
            // borular
            for(let i=0; i<pipes.length; i++){
                pipes[i].x -= 2.2;
                if(pipes[i].x + PIPE_WIDTH < 0){
                    pipes.splice(i,1);
                    i--;
                    continue;
                }
                // skor kontrol
                if(!pipes[i].counted && pipes[i].x + PIPE_WIDTH < bird.x){
                    pipes[i].counted = true;
                    score++;
                    updateScoreUI();
                    playSound('point');
                }
                // çarpışma
                let birdLeft = bird.x - BIRD_SIZE/2;
                let birdRight = bird.x + BIRD_SIZE/2;
                let birdTop = bird.y - BIRD_SIZE/2;
                let birdBottom = bird.y + BIRD_SIZE/2;
                let pipeTopBottomY = pipes[i].y;
                let pipeBottomY = pipes[i].y + PIPE_GAP;
                if(birdRight > pipes[i].x && birdLeft < pipes[i].x + PIPE_WIDTH){
                    if(birdTop < pipeTopBottomY || birdBottom > pipeBottomY){
                        gameOver();
                    }
                }
            }
            // yeni boru ekle
            if(pipes.length === 0 || pipes[pipes.length-1].x < W - PIPE_SPACING){
                let newY = Math.random() * (H - PIPE_GAP - 100) + 50;
                pipes.push({ x: W, y: newY, counted: false });
            }
            // kuş dönüşü
            bird.rotation = Math.min(Math.max(bird.vy * 3, -30), 60);
            // zemin kayması
            groundX = (groundX - 2) % 56;
        }
        
        // Çizim (sprite'lar ile)
        function draw(){
            if(!assetsReady){
                ctx.fillStyle="#222";
                ctx.fillRect(0,0,W,H);
                ctx.fillStyle="white";
                ctx.font="16px monospace";
                ctx.fillText("Yükleniyor sprite'lar...",W/2-80,H/2);
                return;
            }
            // arkaplan
            let bgImg = spriteImages['background-day'] || spriteImages['background-night'];
            if(bgImg) ctx.drawImage(bgImg,0,0,W,H);
            else { ctx.fillStyle="#4ec0ca"; ctx.fillRect(0,0,W,H); }
            
            // borular (pipe-green)
            let pipeImg = spriteImages['pipe-green'] || spriteImages['pipe-red'];
            for(let p of pipes){
                if(pipeImg){
                    ctx.drawImage(pipeImg, p.x, p.y - 320, PIPE_WIDTH, 320);
                    ctx.drawImage(pipeImg, p.x, p.y + PIPE_GAP, PIPE_WIDTH, H - p.y - PIPE_GAP);
                } else {
                    ctx.fillStyle="#228B22";
                    ctx.fillRect(p.x, p.y-320, PIPE_WIDTH, 320);
                    ctx.fillRect(p.x, p.y+PIPE_GAP, PIPE_WIDTH, H-p.y-PIPE_GAP);
                }
            }
            // zemin
            let baseImg = spriteImages['base'];
            if(baseImg){
                for(let i=0;i<3;i++) ctx.drawImage(baseImg, groundX + i*336, H-50, 336, 50);
            } else {
                ctx.fillStyle="#ded895";
                ctx.fillRect(0,H-50,W,50);
            }
            // kuş (animasyon)
            let birdSprite = spriteImages[birdVariants[Math.floor(Date.now()/100)%3]];
            if(!birdSprite) birdSprite = spriteImages['yellowbird-midflap'];
            ctx.save();
            ctx.translate(bird.x, bird.y);
            ctx.rotate(bird.rotation * Math.PI/180);
            ctx.drawImage(birdSprite, -BIRD_SIZE/2, -BIRD_SIZE/2, BIRD_SIZE, BIRD_SIZE);
            ctx.restore();
            
            // skoru sprite rakamları ile göster (0.png,1.png...)
            let scoreStr = score.toString();
            let digitW = 20;
            let startX = W/2 - (scoreStr.length * digitW)/2;
            for(let i=0;i<scoreStr.length;i++){
                let digitChar = scoreStr[i];
                let digitImg = spriteImages[digitChar];
                if(digitImg){
                    ctx.drawImage(digitImg, startX + i*digitW, 30, 24, 28);
                } else {
                    ctx.fillStyle="white";
                    ctx.font="bold 32px monospace";
                    ctx.fillText(digitChar, startX+i*digitW, 55);
                }
            }
            // start mesajı sprite ile göster (message.png)
            if(gameState === 'start'){
                let msgImg = spriteImages['message'];
                if(msgImg) ctx.drawImage(msgImg, W/2-92, H/2-70, 184, 100);
                else {
                    ctx.fillStyle="rgba(0,0,0,0.7)";
                    ctx.fillRect(W/2-100, H/2-50, 200, 60);
                    ctx.fillStyle="white";
                    ctx.fillText("TAP TO START",W/2-70,H/2-15);
                }
            } else if(gameState === 'gameover'){
                let goImg = spriteImages['gameover'];
                if(goImg) ctx.drawImage(goImg, W/2-96, H/2-80, 192, 64);
                else {
                    ctx.fillStyle="black";
                    ctx.fillRect(W/2-90, H/2-50, 180, 50);
                    ctx.fillStyle="red";
                    ctx.fillText("GAME OVER",W/2-65,H/2-15);
                }
            }
        }
        
        function jump(){
            if(gameState === 'playing'){
                bird.vy = JUMP_FORCE;
                playSound('wing');
            } else if(gameState === 'start'){
                gameState = 'playing';
                document.getElementById('startMessage').classList.add('hide');
                resetGameForNewRun();
                bird.vy = JUMP_FORCE;
                playSound('wing');
            }
        }
        
        function animationLoop(){
            updateGame();
            draw();
            requestAnimationFrame(animationLoop);
        }
        
        function resetGameForNewRun(){
            score = 0;
            updateScoreUI();
            bird.y = H/2;
            bird.vy = 0;
            bird.rotation = 0;
            pipes = [];
            generateInitialPipes();
            gameState = 'playing';
            document.getElementById('startMessage').classList.add('hide');
            let modal = document.getElementById('questionModal');
            if(!modal.classList.contains('hide')) modal.classList.add('hide');
        }
        
        // tuş / dokunmatik
        canvas.addEventListener('click', (e) => {
            e.preventDefault();
            jump();
        });
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            jump();
        });
        
        // Oyun başlangıcı hazırlığı
        generateInitialPipes();
        updateScoreUI();
        animationLoop();
        
        // periyodik asset kontrol
        let checkAssets = setInterval(()=>{
            if(assetsReady){
                clearInterval(checkAssets);
                console.log("tüm assetler yüklendi");
            }
        },200);
    })();
</script>
</body>
</html>
